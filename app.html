<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>FamíliaConnect - Painel</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Configuração de Importações (ES Modules) -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js"
      }
    }
    </script>
    
    <!-- Compilador Babel para o browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Manifesto PWA Fixo (Hardcoded) para garantir a leitura do Novo Ícone e forçar atualização -->
    <link rel="manifest" href='data:application/manifest+json,%7B%22name%22%3A%22Fam%C3%ADliaConnect%22%2C%22short_name%22%3A%22Fam%C3%ADliaConnect%22%2C%22start_url%22%3A%22%2Fapp.html%3Fv%3D2%22%2C%22display%22%3A%22standalone%22%2C%22theme_color%22%3A%22%231E293B%22%2C%22background_color%22%3A%22%230F172A%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fi.ibb.co%2Ffzj8Gr5W%2FIcone-familiaconnect.png%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%2C%7B%22src%22%3A%22https%3A%2F%2Fi.ibb.co%2Ffzj8Gr5W%2FIcone-familiaconnect.png%22%2C%22sizes%22%3A%22512x512%22%2C%22type%22%3A%22image%2Fpng%22%2C%22purpose%22%3A%22any%20maskable%22%7D%5D%7D'>
    <meta name="theme-color" content="#1E293B">
    <link rel="apple-touch-icon" href="https://i.ibb.co/fzj8Gr5W/Icone-familiaconnect.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
        // Disponibilizar para o React usar no logo interno
        window.APP_ICON_URL = "https://i.ibb.co/fzj8Gr5W/Icone-familiaconnect.png"; 
    </script>

    <style>
        /* Estilos globais para ocultar barras de scroll nativas mas manter funcionalidade */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-x-hidden">
    
    <div id="root"></div>

    <!-- Código da Aplicação React -->
    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useRef, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          Home, DollarSign, CheckSquare, ShoppingCart, Plus, Calendar, RefreshCw, Trash2, Check, 
          MessageSquare, AlertCircle, LogOut, Users, ChevronRight, Activity, Stethoscope, Pill, 
          ArrowRight, Clock, Syringe, Timer, ChevronLeft, Info, History, PartyPopper, Camera, 
          TrendingUp, TrendingDown, Star, Heart, User, Lock, ShieldCheck, List, Share2, Wallet, Printer, MapPin
        } from 'lucide-react';

        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, getDoc, setDoc, query } from 'firebase/firestore';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';

        // --- CONFIGURAÇÃO GLOBAL DO SEU PROJETO ---
        const firebaseConfig = {
          apiKey: "AIzaSyAaO7ku44gWyqwAHUC2lu_Z71MA0b-kegU",
          authDomain: "familiaconnect-452fc.firebaseapp.com",
          projectId: "familiaconnect-452fc",
          storageBucket: "familiaconnect-452fc.firebasestorage.app",
          messagingSenderId: "1015568222028",
          appId: "1:1015568222028:web:39c98e4bf5e6d26db471e9",
          measurementId: "G-PNP2TJ1X27"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'familia-connect-pro';
        
        // --- SISTEMA DE VERSÃO PARA ATUALIZAÇÃO ---
        const APP_VERSION = "1.1.11"; // Adicionado Peso e Altura na ficha médica

        const BRAND_LOGO = window.APP_ICON_URL || "https://i.ibb.co/fzj8Gr5W/Icone-familiaconnect.png";
        
        // Fuso horário local corrigido para evitar bugs de viragem de dia
        const getLocalDate = (offsetDays = 0) => {
            const d = new Date();
            d.setDate(d.getDate() + offsetDays);
            return new Date(d.getTime() - (d.getTimezoneOffset() * 60000)).toISOString().split('T')[0];
        };
        const today = getLocalDate(0);
        const tomorrow = getLocalDate(1);

        const formatDate = (dateString) => {
          if (!dateString) return '--/--';
          const options = { day: '2-digit', month: '2-digit', year: 'numeric' };
          return new Date(dateString + 'T12:00:00').toLocaleDateString('pt-PT', options); 
        };

        // --- FUNÇÃO PARA CONVERTER VALORES (Vírgulas para Pontos) ---
        const parseValor = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            if (typeof val === 'number') return val;
            let str = val.toString().replace(',', '.');
            return parseFloat(str) || 0;
        };

        const SummaryCard = ({ title, sub, icon, color, onClick }) => (
            <div className="bg-white p-4 sm:p-5 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col gap-3 cursor-pointer hover:shadow-md transition-all active:scale-95 text-slate-800" onClick={onClick}>
                <div className={`w-10 h-10 ${color} rounded-2xl flex items-center justify-center shadow-inner shrink-0`}>{icon}</div>
                <div className="text-left min-w-0">
                    <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest leading-none mb-1 truncate">{title}</p>
                    <p className="font-bold text-slate-800 text-[11px] leading-tight truncate">{sub}</p>
                </div>
            </div>
        );

        const AlertCard = ({ type, icon, title, sub, onClick, onShare, onNavigate }) => {
            const c = { 
                danger: "bg-red-600 text-white border-b-4 border-red-900", 
                warning: "bg-amber-500 text-white border-b-4 border-amber-700",
                blue: "bg-blue-600 text-white border-b-4 border-blue-900",
                indigo: "bg-indigo-600 text-white border-b-4 border-indigo-900",
                cyan: "bg-cyan-600 text-white border-b-4 border-cyan-900",
                rose: "bg-rose-500 text-white border-b-4 border-rose-800"
            };
            return (
                <div className={`${c[type] || c.danger} p-5 rounded-[2rem] shadow-xl flex items-center justify-between transition-all text-left animate-in zoom-in duration-300 w-full`}>
                    <div className="flex-1 min-w-0 cursor-pointer active:scale-[0.98] pr-2" onClick={onClick}>
                        <div className="flex items-center gap-2 mb-1 opacity-80">
                            <span className="scale-75 shrink-0">{icon}</span>
                            <p className="text-[9px] font-black uppercase tracking-widest leading-none truncate">{title}</p>
                        </div>
                        <p className="font-black text-base sm:text-lg leading-tight truncate">{sub}</p>
                    </div>
                    <div className="flex gap-1 shrink-0">
                        {onNavigate && (
                            <button onClick={(e) => { e.stopPropagation(); onNavigate(); }} className="p-2 sm:p-3 bg-white/20 rounded-full hover:bg-white/30 transition-colors active:scale-90" title="Abrir GPS">
                                <MapPin size={18} />
                            </button>
                        )}
                        {onShare ? (
                            <button onClick={(e) => { e.stopPropagation(); onShare(); }} className="p-2 sm:p-3 bg-white/20 rounded-full hover:bg-white/30 transition-colors active:scale-90" title="Partilhar no WhatsApp">
                                <Share2 size={18} />
                            </button>
                        ) : (
                            !onNavigate && <ChevronRight size={20} className="opacity-40 cursor-pointer" onClick={onClick} />
                        )}
                    </div>
                </div>
            );
        };

        const NavBtn = ({ icon, active, onClick, color }) => (
          <button onClick={onClick} className={`relative p-3 sm:p-4 transition-all duration-300 ${active ? '-translate-y-2' : 'text-slate-300'}`}>
            <div className={`transition-all ${active ? `${color} scale-125` : ''}`}>{icon}</div>
            {active && <div className={`absolute -bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full ${color.replace('text', 'bg')} animate-pulse`}></div>}
          </button>
        );

        const Dashboard = ({ 
            familyName, familyLogo, localNote, setLocalNote, user, familyId, setActiveTab, 
            finances, tasks, medications, groceries, events, vaccines, healthRecords, updateFamilyLogo 
        }) => {
            const pendingExpenses = finances.filter(f => (f.type === 'expense' || f.type === 'savings') && !f.paid);
            const overdueBills = pendingExpenses.filter(f => f.date < today);
            const todayBills = pendingExpenses.filter(f => f.date === today);
            const tomorrowBills = pendingExpenses.filter(f => f.date === tomorrow);

            const overdueTasks = tasks.filter(t => !t.completed && t.date < today);
            const todayTasks = tasks.filter(t => !t.completed && t.date === today);
            const tomorrowTasks = tasks.filter(t => !t.completed && t.date === tomorrow);

            const urgentVac = vaccines
                .filter(v => v.nextDoseDate)
                .sort((a,b) => a.nextDoseDate.localeCompare(b.nextDoseDate))[0];
            
            const getDoseSchedule = (startTime, interval) => {
                if (!startTime) return [];
                const int = parseInt(interval);
                const [startH, startM] = startTime.split(':').map(Number);
                const doses = [];
                for (let i = 0; i < 24; i += int) {
                  const h = (startH + i) % 24;
                  doses.push(`${h.toString().padStart(2, '0')}:${startM.toString().padStart(2, '0')}`);
                }
                return doses.sort();
            };

            const nextMedDose = useMemo(() => {
                const active = medications.filter(m => today >= m.startDate && (today <= m.endDate || !m.endDate));
                if (!active.length) return null;
                const nowMin = new Date().getHours() * 60 + new Date().getMinutes();
                let closest = null; let minDiff = Infinity;
                active.forEach(m => {
                    getDoseSchedule(m.startTime || "08:00", m.interval).forEach(time => {
                        const [h, min] = time.split(':').map(Number);
                        let diff = (h * 60 + min) - nowMin;
                        if (diff < 0) diff += 1440;
                        if (diff < minDiff) { minDiff = diff; closest = { ...m, nextTime: time }; }
                    });
                });
                return closest;
            }, [medications]);

            const nextAppointment = healthRecords.filter(r => r.date >= today).sort((a,b) => a.date.localeCompare(b.date))[0];
            const nextEvent = events.filter(ev => ev.date >= today).sort((a,b) => a.date.localeCompare(b.date))[0];
            
            const pendingGroceries = groceries.filter(g => !g.bought);

            // Verifica se há algum lembrete a mostrar
            const hasAlerts = overdueBills[0] || todayBills[0] || tomorrowBills[0] || overdueTasks[0] || todayTasks[0] || tomorrowTasks[0] || nextMedDose || urgentVac || nextAppointment || nextEvent || pendingGroceries.length > 0;
            
            const logoInputRef = useRef(null);

            const handleShareWhatsApp = () => {
                const text = `Venha participar da nossa família no FamíliaConnect! 🏠✨\n\nAceda a: https://www.familiaconnect.com.br\nID da Família: *${familyId}*\n\nPeça a senha a quem lhe enviou este convite para manter a segurança!`;
                const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
                window.open(url, '_blank');
            };

            const forceUpdate = () => {
                if(window.caches) {
                    caches.keys().then(function(names) {
                        for (let name of names) caches.delete(name);
                    });
                }
                window.location.reload(true);
            };

            const shareItemToWhatsApp = (prefix, itemDetails) => {
                const text = `${prefix}\n\n${itemDetails}\n\n_Enviado via FamíliaConnect_ 🏠`;
                const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
                window.open(url, '_blank');
            };

            const getEventShareText = (ev) => {
                let text = `*${ev.title}*\nData: ${formatDate(ev.date)} às ${ev.time || '--:--'}\nLocal: ${ev.location || 'A definir'}`;
                if (ev.address) {
                    text += `\nEndereço: ${ev.address}\n📍 Mapa: https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(ev.address)}`;
                }
                return text;
            };

            return (
              <div className="space-y-6 pb-24 text-left duration-500 w-full overflow-hidden px-1">
                <header className="flex justify-between items-center py-4 px-2 sm:px-4 print:hidden w-full gap-2">
                  <div className="flex items-center gap-3 flex-1 min-w-0">
                    <div className="relative shrink-0">
                      <div 
                        onClick={() => logoInputRef.current?.click()}
                        className="w-14 h-14 bg-slate-200 rounded-full shadow-2xl overflow-hidden border-2 border-white ring-2 ring-indigo-50 cursor-pointer active:scale-95 transition-all"
                      >
                          <img src={familyLogo || BRAND_LOGO} alt="Perfil" className="w-full h-full object-cover" />
                          <div className="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <Camera className="text-white" size={16} />
                          </div>
                      </div>
                      <button 
                        onClick={() => logoInputRef.current?.click()}
                        className="absolute -bottom-1 -right-1 bg-indigo-600 text-white p-1.5 rounded-full border-2 border-white shadow-lg z-10 active:scale-110 transition-transform"
                      >
                        <Camera size={10}/>
                      </button>
                      <input type="file" ref={logoInputRef} className="hidden" accept="image/*" onChange={(e) => { const file = e.target.files[0]; if (file) { const reader = new FileReader(); reader.onloadend = () => updateFamilyLogo(reader.result); reader.readAsDataURL(file); } }} />
                    </div>
                    <div className="flex flex-col justify-center min-w-0 flex-1">
                      <h1 className="text-xl sm:text-2xl font-black text-slate-800 tracking-tighter leading-tight mb-0.5 truncate">Família {familyName}</h1>
                      <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none truncate">Painel de controle</p>
                    </div>
                  </div>
                  <div className="flex gap-1.5 shrink-0 pr-1">
                      <button onClick={forceUpdate} title="Procurar Atualizações" className="p-2.5 sm:p-3 bg-white rounded-xl shadow-md text-blue-500 hover:text-blue-600 hover:shadow-lg transition-all active:scale-90"><RefreshCw size={18}/></button>
                      <button onClick={handleShareWhatsApp} title="Convidar via WhatsApp" className="p-2.5 sm:p-3 bg-white rounded-xl shadow-md text-emerald-500 hover:text-emerald-600 hover:shadow-lg transition-all active:scale-90"><Share2 size={18}/></button>
                      <button onClick={() => { localStorage.clear(); window.location.reload(); }} title="Sair" className="p-2.5 sm:p-3 bg-white rounded-xl shadow-md text-slate-400 hover:text-red-500 hover:shadow-lg transition-all active:scale-90"><LogOut size={18}/></button>
                  </div>
                </header>

                <div className="bg-yellow-100 p-6 rounded-[2.5rem] border-b-4 border-yellow-200 shadow-sm print:hidden">
                    <div className="flex items-start gap-3">
                        <MessageSquare className="text-yellow-600 mt-1 shrink-0" size={20} />
                        <div className="flex-1 min-w-0">
                            <p className="text-[10px] font-black text-yellow-700 uppercase mb-1 tracking-widest leading-none truncate">Mural da Família</p>
                            <textarea value={localNote} onChange={(e) => { setLocalNote(e.target.value); if (user) updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_families', familyId), { stickyNote: e.target.value }).catch(err => console.error(err)); }} className="bg-transparent w-full font-bold text-yellow-900 resize-none outline-none h-20 text-lg leading-tight mt-1" placeholder="Deixe um recado..."/>
                        </div>
                    </div>
                </div>

                <div className="grid grid-cols-2 gap-3 sm:gap-4 print:hidden">
                    <SummaryCard title="Finanças" sub={`${pendingExpenses.length} pendentes`} icon={<DollarSign/>} color={overdueBills.length ? "bg-red-50 text-red-600" : "bg-emerald-50 text-emerald-600"} onClick={()=>setActiveTab('finance')}/>
                    <SummaryCard title="Tarefas" sub={`${tasks.filter(t=>!t.completed).length} abertas`} icon={<CheckSquare/>} color={overdueTasks.length ? "bg-red-50 text-red-600" : "bg-indigo-50 text-indigo-600"} onClick={()=>setActiveTab('tasks')}/>
                    <SummaryCard title="Saúde" sub={`${medications.length} remédios`} icon={<Activity/>} color="bg-cyan-50 text-cyan-600" onClick={()=>setActiveTab('health')}/>
                    <SummaryCard title="Mercado" sub={`${groceries.filter(g=>!g.bought).length} itens`} icon={<ShoppingCart/>} color="bg-amber-50 text-amber-500" onClick={()=>setActiveTab('groceries')}/>
                    <SummaryCard title="Lazer" sub={`${events.filter(e=>e.date >= today).length} eventos`} icon={<PartyPopper/>} color="bg-rose-50 text-rose-500" onClick={()=>setActiveTab('leisure')}/>
                </div>

                <div className="space-y-4 mb-8 print:hidden">
                    <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 mt-4">Lembretes Importantes</h3>
                    
                    {!hasAlerts ? (
                        <div className="text-center p-8 bg-white rounded-[2rem] border border-slate-100 shadow-sm animate-in fade-in">
                            <Check size={32} className="mx-auto mb-2 text-emerald-400 opacity-80"/>
                            <p className="font-bold text-sm text-slate-600">Tudo em dia!</p>
                            <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest mt-1">Nenhum lembrete para hoje</p>
                        </div>
                    ) : (
                        <div className="space-y-3">
                            {overdueBills[0] && <AlertCard type="danger" icon={<AlertCircle/>} title={overdueBills[0].type === 'savings' ? "Aporte Atrasado" : "Gasto Vencido"} sub={`${overdueBills[0].title} • R$ ${parseValor(overdueBills[0].value).toFixed(2)}`} onClick={()=>setActiveTab('finance')} onShare={() => shareItemToWhatsApp('🚨 *ATRASADO*', `*${overdueBills[0].title}*\nValor: R$ ${parseValor(overdueBills[0].value).toFixed(2)}\nVencimento original: ${formatDate(overdueBills[0].date)}\nQuem paga: ${overdueBills[0].assignee || 'A definir'}`)}/>}
                            {todayBills[0] && <AlertCard type="danger" icon={<DollarSign/>} title={todayBills[0].type === 'savings' ? "Investir Hoje" : "Vence Hoje"} sub={`${todayBills[0].title} • R$ ${parseValor(todayBills[0].value).toFixed(2)}`} onClick={()=>setActiveTab('finance')} onShare={() => shareItemToWhatsApp('💸 *VENCE HOJE*', `*${todayBills[0].title}*\nValor: R$ ${parseValor(todayBills[0].value).toFixed(2)}\nQuem paga: ${todayBills[0].assignee || 'A definir'}`)}/>}
                            {tomorrowBills[0] && <AlertCard type="warning" icon={<Clock/>} title={tomorrowBills[0].type === 'savings' ? "Investir Amanhã" : "Vence Amanhã"} sub={`${tomorrowBills[0].title} • R$ ${parseValor(tomorrowBills[0].value).toFixed(2)}`} onClick={()=>setActiveTab('finance')} onShare={() => shareItemToWhatsApp('⏰ *VENCE AMANHÃ*', `*${tomorrowBills[0].title}*\nValor: R$ ${parseValor(tomorrowBills[0].value).toFixed(2)}\nQuem paga: ${tomorrowBills[0].assignee || 'A definir'}`)}/>}
                            
                            {overdueTasks[0] && <AlertCard type="danger" icon={<AlertCircle/>} title="Tarefa Vencida" sub={`${overdueTasks[0].title}${overdueTasks.length > 1 ? ` (+${overdueTasks.length - 1})` : ''} • ${formatDate(overdueTasks[0].date)}`} onClick={()=>setActiveTab('tasks')} onShare={() => shareItemToWhatsApp('🚨 *TAREFA ATRASADA*', `*${overdueTasks[0].title}*\nResponsável: ${overdueTasks[0].assignee || 'Todos'}\nEra para: ${formatDate(overdueTasks[0].date)}`)}/>}
                            {todayTasks[0] && <AlertCard type="danger" icon={<CheckSquare/>} title="Tarefa para Hoje" sub={`${todayTasks[0].title}${todayTasks.length > 1 ? ` (+${todayTasks.length - 1})` : ''} às ${todayTasks[0].time || '--:--'}`} onClick={()=>setActiveTab('tasks')} onShare={() => shareItemToWhatsApp('✅ *TAREFA DE HOJE*', `*${todayTasks[0].title}*\nResponsável: ${todayTasks[0].assignee || 'Todos'}\nHorário: ${todayTasks[0].time || '--:--'}`)}/>}
                            {tomorrowTasks[0] && <AlertCard type="warning" icon={<Clock/>} title="Tarefa para Amanhã" sub={`${tomorrowTasks[0].title}${tomorrowTasks.length > 1 ? ` (+${tomorrowTasks.length - 1})` : ''}`} onClick={()=>setActiveTab('tasks')} onShare={() => shareItemToWhatsApp('⏰ *TAREFA PARA AMANHÃ*', `*${tomorrowTasks[0].title}*\nResponsável: ${tomorrowTasks[0].assignee || 'Todos'}\nHorário: ${tomorrowTasks[0].time || '--:--'}`)}/>}

                            {nextMedDose && <AlertCard type="blue" icon={<Pill/>} title={`Dose às ${nextMedDose.nextTime}`} sub={`${nextMedDose.name} (${nextMedDose.patient})`} onClick={()=>setActiveTab('health')} onShare={() => shareItemToWhatsApp('💊 *HORA DO REMÉDIO*', `*${nextMedDose.name}*\nPaciente: ${nextMedDose.patient}\nHorário da dose: ${nextMedDose.nextTime}`)}/>}
                            {urgentVac && <AlertCard type="indigo" icon={<Syringe/>} title="Próxima Vacina" sub={`${urgentVac.name} • ${formatDate(urgentVac.nextDoseDate)}`} onClick={()=>setActiveTab('health')} onShare={() => shareItemToWhatsApp('💉 *LEMBRETE DE VACINA*', `*${urgentVac.name}*\nPaciente: ${urgentVac.patient}\nData: ${formatDate(urgentVac.nextDoseDate)}`)}/>}
                            {nextAppointment && <AlertCard type="cyan" icon={<Stethoscope/>} title="Agendamento" sub={`${nextAppointment.title} • ${formatDate(nextAppointment.date)}`} onClick={()=>setActiveTab('health')} onShare={() => shareItemToWhatsApp('🩺 *CONSULTA/EXAME*', `*${nextAppointment.title}*\nPaciente: ${nextAppointment.patient}\nData: ${formatDate(nextAppointment.date)} às ${nextAppointment.time}\nLocal: ${nextAppointment.location || 'A definir'}`)}/>}
                            {nextEvent && <AlertCard type="rose" icon={<PartyPopper/>} title="Próximo Evento" sub={`${nextEvent.title} • ${formatDate(nextEvent.date)} às ${nextEvent.time || '--:--'}`} onClick={()=>setActiveTab('leisure')} onShare={() => shareItemToWhatsApp('🎉 *NOSSO PRÓXIMO EVENTO*', getEventShareText(nextEvent))} onNavigate={nextEvent.address ? () => { const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(nextEvent.address)}`; window.open(url, '_blank'); } : null} />}
                            {pendingGroceries.length > 0 && <AlertCard type="warning" icon={<ShoppingCart/>} title="Fazer Compras" sub={`${pendingGroceries.length} itens no carrinho`} onClick={()=>setActiveTab('groceries')} onShare={() => shareItemToWhatsApp('🛒 *LISTA DE MERCADO*', pendingGroceries.map(g => `• ${g.quantity || 1} ${g.unit || 'un'} - ${g.name}`).join('\n'))}/>}
                        </div>
                    )}
                </div>
              </div>
            );
        };

        const FinanceModule = ({ finances, recurringFinances, familyId, formatDate, today, appId, showStatus }) => {
            const [ni, setNi] = useState({ title: '', value: '', date: today, type: 'expense', frequency: 'once', installments: 2, assignee: '' });
            
            const handlePrint = () => {
                window.print();
            };

            const saveFinance = async ()=>{
                if(!ni.title || !ni.value) return;
                
                let extraData = {};
                if (ni.frequency === 'monthly' || ni.frequency === 'weekly' || ni.frequency === 'monthly_variable') {
                    const alreadyExists = recurringFinances.some(r => r.title.toLowerCase() === ni.title.toLowerCase());
                    if (!alreadyExists) {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_recurring'), { 
                            title: ni.title, value: parseValor(ni.value), type: ni.type, frequency: ni.frequency, assignee: ni.assignee, familyId 
                        });
                    }
                    extraData = { isRecurring: true, frequency: ni.frequency };
                } else if (ni.frequency === 'installments') {
                    extraData = { currentInstallment: 1, totalInstallments: Number(ni.installments) };
                }

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_finances'), { 
                    title: ni.title, value: parseValor(ni.value), type: ni.type, date: ni.date, assignee: ni.assignee, familyId, paid: false, createdAt: Date.now(), ...extraData
                });
                
                setNi({ title: '', value: '', date: ni.date, type: ni.type, frequency: 'once', installments: 2, assignee: '' });
                showStatus("Salvo!");
            };

            const addFromRecurring = async (rec) => {
                const d = new Date();
                if (rec.frequency === 'weekly') d.setDate(d.getDate() + 7);
                else { const originalDay = d.getDate(); d.setMonth(d.getMonth() + 1); if (d.getDate() !== originalDay) d.setDate(0); }
                const dateStr = d.toISOString().split('T')[0];

                if (rec.frequency === 'monthly_variable') {
                    setNi({ title: rec.title, value: '', date: dateStr, type: rec.type, frequency: 'monthly_variable', installments: 2, assignee: rec.assignee || '' });
                    showStatus("Preencha o valor da fatura deste mês e clique em Salvar!");
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_finances'), { 
                    title: rec.title, value: parseValor(rec.value), type: rec.type, date: dateStr, assignee: rec.assignee || '', familyId, paid: false, isRecurring: true, frequency: rec.frequency || 'monthly', createdAt: Date.now() 
                });
                showStatus(`Lançado para ${formatDate(dateStr)}: ${rec.title}`);
            };

            const togglePaid = async (f) => {
                const newPaidStatus = !f.paid;
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_finances', f.id), { paid: newPaidStatus });

                if (newPaidStatus && !f.nextCreated) {
                    let shouldCreateNext = false; let nextDateObj = new Date(f.date + 'T12:00:00'); let nextInstallment = null;
                    if (f.frequency !== 'monthly_variable' && (f.isRecurring || f.frequency === 'monthly' || f.frequency === 'weekly')) {
                        shouldCreateNext = true;
                        if (f.frequency === 'weekly') nextDateObj.setDate(nextDateObj.getDate() + 7);
                        else nextDateObj.setMonth(nextDateObj.getMonth() + 1);
                    } else if (f.totalInstallments && f.currentInstallment < f.totalInstallments) {
                        shouldCreateNext = true; nextDateObj.setMonth(nextDateObj.getMonth() + 1); nextInstallment = f.currentInstallment + 1;
                    }

                    if (shouldCreateNext) {
                        const nextDateStr = nextDateObj.toISOString().split('T')[0];
                        let nextData = { title: f.title, value: parseValor(f.value), type: f.type, date: nextDateStr, assignee: f.assignee || '', familyId, paid: false, createdAt: Date.now() };
                        if (nextInstallment) { nextData.currentInstallment = nextInstallment; nextData.totalInstallments = f.totalInstallments; } 
                        else { nextData.isRecurring = true; nextData.frequency = f.frequency || 'monthly'; }

                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'fc_finances'), nextData);
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_finances', f.id), { nextCreated: true });
                        if (nextInstallment) showStatus(`Parcela ${nextInstallment}/${f.totalInstallments} gerada!`);
                        else showStatus("Próximo lançamento gerado automaticamente!");
                    }
                }
            };

            const deleteRecurring = async (id) => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'fc_recurring', id)); showStatus("Removido da rotina"); };

            const totalIncome = finances.filter(f => f.type === 'income').reduce((acc, curr) => acc + parseValor(curr.value), 0);
            const totalExpenses = finances.filter(f => f.type === 'expense').reduce((acc, curr) => acc + parseValor(curr.value), 0);
            const totalSavings = finances.filter(f => f.type === 'savings').reduce((acc, curr) => acc + parseValor(curr.value), 0);
            const balance = totalIncome - totalExpenses - totalSavings;

            return (
                <div className="space-y-6 text-left text-slate-800 duration-300 print:space-y-4 w-full overflow-hidden">
                    <div className="bg-emerald-600 p-6 rounded-[2.5rem] text-white shadow-xl text-center relative print:bg-transparent print:text-slate-800 print:shadow-none print:p-0 print:border-b print:border-slate-200 print:rounded-none print:pb-6">
                        <button onClick={handlePrint} className="absolute top-6 right-6 p-2 bg-white/20 rounded-full hover:bg-white/30 transition-colors print:hidden" title="Imprimir Relatório">
                            <Printer size={18} />
                        </button>
                        <h2 className="text-2xl font-black mb-1">Gestão Financeira</h2>
                        <p className="text-emerald-100 text-xs font-bold uppercase opacity-80 print:text-slate-500">Controle a economia da família</p>
                        <div className="grid grid-cols-2 gap-2 mt-4 bg-black/10 p-3 rounded-2xl print:bg-slate-50 print:border print:border-slate-200">
                            <div className="text-left p-2 bg-white/5 rounded-xl print:bg-transparent"><p className="text-[8px] uppercase font-black opacity-70 tracking-widest print:text-slate-500">Renda da Família</p><p className="font-bold text-sm text-emerald-300 print:text-emerald-600">R$ {totalIncome.toFixed(2)}</p></div>
                            <div className="text-left p-2 bg-white/5 rounded-xl print:bg-transparent"><p className="text-[8px] uppercase font-black opacity-70 tracking-widest print:text-slate-500">Despesas</p><p className="font-bold text-sm text-red-300 print:text-red-600">R$ {totalExpenses.toFixed(2)}</p></div>
                            <div className="text-left p-2 bg-white/5 rounded-xl print:bg-transparent"><p className="text-[8px] uppercase font-black opacity-70 tracking-widest print:text-slate-500">Guardado / Invest.</p><p className="font-bold text-sm text-blue-300 print:text-blue-600">R$ {totalSavings.toFixed(2)}</p></div>
                            <div className="text-left p-2 bg-white/5 rounded-xl print:bg-transparent"><p className="text-[8px] uppercase font-black opacity-70 tracking-widest print:text-slate-500">Saldo Livre</p><p className={`font-black text-sm ${balance >= 0 ? 'text-white print:text-slate-800' : 'text-red-300 print:text-red-600'}`}>R$ {balance.toFixed(2)}</
